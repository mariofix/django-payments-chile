[tox]
envlist =
    py{310,311,312,313,314}-dj52
    py{312,313,314}-dj60
    py{313,314}-djmain
skip_missing_interpreters = true

[testenv]
allowlist_externals=pytest,coverage
usedevelop=True
ignore_outcome =
    djmain: True
ignore_errors =
    djmain: True
deps=
    dj52: Django>=5.2,<5.3
    dj60: Django>=6.0,<6.1
    djmain: https://github.com/django/django/archive/main.tar.gz
    django-payments[dev]
    coverage
    pytest
    pytest-cov
    pytest-django
    pytest-mock
    dj-database-url
    factory-boy
    tox
    tox-gh-actions
extras=
  dev
commands=
    pytest -vs {posargs}
    coverage xml

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

[gh-actions:env]
DJANGO =
    5.2: dj52
    6.0: dj60
    main: djmain
